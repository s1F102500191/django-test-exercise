{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/css/style.css' %}">
  </head>

  <body class="detail-page">
    <main class="detail-container">
      <a class="detail-back" href="{% url 'index' %}">Top</a>

      <article class="detail-card {% if task.completed %}task-completed{% elif task.is_overdue_now %}task-overdue{% endif %} priority-{{ task.priority }}">
        <header class="detail-header">
          <p class="detail-label">Task details</p>
          <h1>{{ task.title }}</h1>
          {% if task.completed %}
          <span class="status-badge status-completed">Completed</span>
          {% else %}
          <span class="status-badge status-open">Not completed</span>
          {% endif %}
        </header>

        <dl class="detail-meta">
          <div>
            <dt>Posted at</dt>
            <dd>{{ task.posted_at }}</dd>
          </div>
      {% if task.due_at %}
          <div>
            <dt>Due at</dt>
            <dd>{{ task.due_at }}</dd>
          </div>
      {% endif %}
        </dl>

        <footer class="detail-actions">
          <a class="action-button action-secondary" href="{% url 'update' task.id %}">Edit</a>
          <form class="detail-close-form" action="{% url 'close' task.id %}" method="post">
            {% csrf_token %}
            <button class="action-button action-primary" type="submit">Close</button>
          </form>
        </footer>
      </article>
    </main>
  </body>

</html>
