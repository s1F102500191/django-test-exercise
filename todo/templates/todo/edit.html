{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
<title>To Do Application</title>
<meta charset="UTF-8">
<meta name="author" content="INIAD">
<link rel="stylesheet" href="{% static 'todo/css/style.css' %}">
</head>

<body class="edit-page">
<main class="edit-container">
  <header class="edit-header">
    <h1>Edit task</h1>
    <p>You can edit tasks from the following form.</p>
  </header>

  <form class="edit-form" action="{% url 'update' task.id %}" method="post">
    {% csrf_token %}
    <div class="form-field">
      <label for="titleInput">Title</label>
      <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
    </div>
    <div class="form-field">
      <label for="dueInput">Due at:</label>
      <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:"Y-m-d H:i" }}">
    </div>
    <div>
      <button type="submit">Submit</button>
    </div>
  </form>
</main>
</body>
</html>
